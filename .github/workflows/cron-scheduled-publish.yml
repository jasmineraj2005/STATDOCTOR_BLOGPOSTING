name: Cron — scheduled-publish

# Daily 09:00 UTC. Publishes one queued article from the 'scheduled' queue
# if today is a publish day (Tue / Wed / Fri / Sun in UTC). Non-publish days
# the endpoint no-ops and the cron run is still recorded for the heartbeat.

on:
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC (~19:00 Sydney AEST evening)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/recover-and-alert
        with:
          name: scheduled-publish
          url: ${{ secrets.CRON_BASE_URL }}/api/cron/scheduled-publish
          token: ${{ secrets.CRON_SECRET }}
          alert_url: ${{ secrets.CRON_BASE_URL }}/api/alerts/dispatch
          alert_token: ${{ secrets.ALERT_INGEST_TOKEN }}

name: Cron — auto-publish-news

# Daily heartbeat for the news auto-publish fallback.
# Posts that have sat pending_review > AUTO_PUBLISH_NEWS_HOURS (default 48)
# get published automatically — the CEO can still unpublish via the dashboard.

on:
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC (~13:00 Sydney)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/auto-publish-news
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.CRON_BASE_URL }}/api/cron/auto-publish-news

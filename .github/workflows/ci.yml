name: CI
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extracted/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: extracted
      - run: pnpm exec tsc --noEmit
        working-directory: extracted
      # Blocking gate: fails fast on test failure with no coverage overhead.
      - run: pnpm test
        working-directory: extracted
      # Informational coverage report (continue-on-error: true) — thresholds
      # become blocking in M0.T10 once backfill is complete.
      - run: pnpm exec vitest run --coverage --reporter=verbose
        working-directory: extracted
        continue-on-error: true
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: statdoctor_admin_playwright
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: extracted/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: extracted
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: extracted
      - run: pnpm exec playwright test
        working-directory: extracted
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/statdoctor_admin_playwright
          ADMIN_TOKEN: playwright-admin
          INGEST_TOKEN: playwright-ingest
          CRON_SECRET: playwright-cron
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest pytest-cov
        working-directory: backend
      - run: pytest --cov=. --cov-report=term-missing
        working-directory: backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

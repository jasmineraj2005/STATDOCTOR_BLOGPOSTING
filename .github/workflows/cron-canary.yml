name: Cron â€” canary

# Fail-Agent Layer D: daily 04:00 UTC synthetic ingestâ†’approveâ†’publish-dryâ†’delete.
# Catches silent regressions in the pipeline self-test path within 24h.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/recover-and-alert
        with:
          name: canary
          url: ${{ secrets.CRON_BASE_URL }}/api/cron/canary
          token: ${{ secrets.CRON_SECRET }}
          alert_url: ${{ secrets.CRON_BASE_URL }}/api/alerts/dispatch
          alert_token: ${{ secrets.ALERT_INGEST_TOKEN }}

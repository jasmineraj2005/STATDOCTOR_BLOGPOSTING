name: Pipeline — generate an article

# Cloud-runs the Python pipeline so the system isn't tied to Anu's laptop.
# Per blog.md cadence: Mon / Wed / Fri 14:00 UTC (midnight Sydney AEDT).
# Also supports manual dispatch from the Actions tab for ad-hoc runs.

on:
  schedule:
    # Mon / Wed / Fri / Sat at 14:00 UTC — staggered drafts that accumulate
    # in pending_review across the week.
    - cron: "0 14 * * 1,3,5,6"
    # Sunday morning Sydney batch: 20:00 UTC Saturday = 7:00 AEST Sunday
    # (= 6:00 AEDT Sunday during daylight-saving Oct–Apr). The concurrency
    # group below queues this if a Saturday 14:00 UTC run is still in flight,
    # so we never collide on past_topics.json.
    - cron: "0 20 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "Force a content stream"
        required: false
        type: choice
        default: ""
        options: ["", "news", "guide", "company"]

permissions:
  contents: read

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          MODE: ${{ inputs.mode }}
        run: python main.py

      - name: Dispatch alert on pipeline failure
        if: failure()
        working-directory: .
        env:
          ALERT_URL: ${{ secrets.CRON_BASE_URL }}/api/alerts/dispatch
          ALERT_TOKEN: ${{ secrets.ALERT_INGEST_TOKEN }}
        run: |
          curl --fail-with-body --max-time 30 -X POST \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer $ALERT_TOKEN" \
               -d '{"kind":"pipeline_failed","severity":"critical","detail":"python main.py exited non-zero (see GH Actions log)"}' \
               "$ALERT_URL" || echo "::error::Alert dispatch failed"

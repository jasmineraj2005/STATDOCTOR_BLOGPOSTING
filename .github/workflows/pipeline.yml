name: Pipeline — generate an article

# Cloud-runs the Python pipeline so the system isn't tied to Anu's laptop.
# Per blog.md cadence: Mon / Wed / Fri 14:00 UTC (midnight Sydney AEDT).
# Also supports manual dispatch from the Actions tab for ad-hoc runs.

on:
  schedule:
    - cron: "0 14 * * 1,3,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Force a content stream"
        required: false
        type: choice
        default: ""
        options: ["", "news", "guide", "company"]

permissions:
  contents: read

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          MODE: ${{ inputs.mode }}
        run: python main.py

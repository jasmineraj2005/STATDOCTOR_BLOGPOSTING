name: Cron — seo-snapshot

# Daily 02:00 UTC. Pulls yesterday's Google Search Console + Bing Webmaster
# data into the DB. Both have a 2-3 day reporting delay so each day's pull
# also refreshes recent dates via the upsert.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/recover-and-alert
        with:
          name: seo-snapshot
          url: ${{ secrets.CRON_BASE_URL }}/api/cron/seo-snapshot
          token: ${{ secrets.CRON_SECRET }}
          alert_url: ${{ secrets.CRON_BASE_URL }}/api/alerts/dispatch
          alert_token: ${{ secrets.ALERT_INGEST_TOKEN }}
